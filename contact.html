<main class="legal">
  <div class="container">
    <div class="legal__header">
      <h1 class="legal__title">Get in Touch</h1>
      <p class="legal__date">We'd love to hear about your project.</p>
    </div>

    <div class="legal__content">

      <!-- Contact Cards -->
      <section class="contact-cards" aria-label="Contact information">
        <a href="mailto:sitepilotpro@gmail.com" class="contact-card">
          <div class="contact-card__icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M22 4L12 13L2 4"/>
            </svg>
          </div>
          <div class="contact-card__label">Email</div>
          <div class="contact-card__value">sitepilotpro@gmail.com</div>
        </a>


      </section>

      <!-- Inquiry Form -->
      <section class="contact-form-section" aria-label="Send an inquiry">
        <h2>Send Us an Inquiry</h2>
        <p>Tell us about your project and we'll get back to you as soon as possible.</p>

        <form name="inquiry" method="POST" data-netlify="true" netlify-honeypot="bot-field" class="contact-form" action="/success.html">
          <!-- Honeypot field for spam prevention (hidden from users) -->
          <p class="visually-hidden" aria-hidden="true">
            <label>Don't fill this out: <input name="bot-field"></label>
          </p>

          <div class="form-row">
            <div class="form-group">
              <label for="name" class="form-label">Full Name <span aria-hidden="true">*</span></label>
              <input type="text" id="name" name="name" required autocomplete="name" placeholder="John Smith" class="form-input">
            </div>
            <div class="form-group">
              <label for="email" class="form-label">Email Address <span aria-hidden="true">*</span></label>
              <input type="email" id="email" name="email" required autocomplete="email" placeholder="john@example.com" class="form-input">
            </div>
          </div>

          <div class="form-group">
            <label for="plan" class="form-label">Interested Plan</label>
            <select id="plan" name="plan" class="form-input form-select">
              <option value="" disabled selected>Select a plan</option>
              <option value="Scout ($500 setup)">Scout — $500 setup + $75/mo</option>
              <option value="Voyager ($1,000 setup)">Voyager — $1,000 setup + $50/wk</option>
              <option value="Explorer ($4,000 setup)">Explorer — $4,000 setup + $100/wk</option>
              <option value="Not sure yet">Not sure yet</option>
            </select>
          </div>

          <div class="form-group">
            <label for="website" class="form-label">Current Website (if any)</label>
            <input type="url" id="website" name="website" autocomplete="url" placeholder="https://yoursite.com" class="form-input">
          </div>

          <div class="form-group">
            <label for="message" class="form-label">Tell Us About Your Project <span aria-hidden="true">*</span></label>
            <textarea id="message" name="message" required rows="5" placeholder="What kind of website do you need? Any specific features, timeline, or goals?" class="form-input form-textarea"></textarea>
          </div>

          <button type="submit" class="btn btn--primary form-submit">
            Send Inquiry
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </button>
        </form>
      </section>

    </div>
  </div>
